<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>피스웍스 | 평화를 위한 사명</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    /* Inter 폰트, 모달 등장 애니메이션 (그록 설계 반영) */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .modal { animation: popIn 0.3s ease-out; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-white min-h-screen transition-colors duration-300">

  <div class="max-w-md mx-auto min-h-screen flex flex-col p-6 relative">

    <!-- 상단 다크/라이트 테마 토글 -->
    <button id="theme-toggle" type="button" aria-label="테마 전환"
            class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center text-2xl hover:scale-110 transition-transform">
    </button>

    <!-- 프로필 영역 -->
    <div class="flex flex-col items-center pt-12 pb-8">
      <img id="profile-img"
           src="https://picsum.photos/id/1005/300/300"
           alt="피스웍스 프로필"
           class="w-32 h-32 rounded-3xl object-cover ring-4 ring-teal-200 dark:ring-teal-900 shadow-xl">
      <h1 class="mt-6 text-4xl font-semibold tracking-tight">피스웍스</h1>
      <p class="mt-2 text-zinc-600 dark:text-zinc-400 text-center text-lg">평화를 위한 사명</p>
    </div>

    <!-- 링크 영역 (실제 URL은 href에 설정) -->
    <div class="space-y-4 flex-1">
      <a href="#"
         class="link-btn block w-full bg-zinc-100 hover:bg-teal-100 dark:bg-zinc-800 dark:hover:bg-teal-950 text-center py-4 rounded-3xl text-lg font-medium transition-all hover:shadow-md active:scale-[0.98]">
        오픈 카톡방
      </a>
      <a href="#"
         class="link-btn block w-full bg-zinc-100 hover:bg-teal-100 dark:bg-zinc-800 dark:hover:bg-teal-950 text-center py-4 rounded-3xl text-lg font-medium transition-all hover:shadow-md active:scale-[0.98]">
        Youtube
      </a>
      <a href="#"
         class="link-btn block w-full bg-zinc-100 hover:bg-teal-100 dark:bg-zinc-800 dark:hover:bg-teal-950 text-center py-4 rounded-3xl text-lg font-medium transition-all hover:shadow-md active:scale-[0.98]">
        Threads
      </a>
      <a href="#"
         class="link-btn block w-full bg-zinc-100 hover:bg-teal-100 dark:bg-zinc-800 dark:hover:bg-teal-950 text-center py-4 rounded-3xl text-lg font-medium transition-all hover:shadow-md active:scale-[0.98]">
        X
      </a>
    </div>

    <!-- 문의하기 버튼 -->
    <button type="button" id="btn-inquiry"
            class="mt-8 w-full bg-teal-500 hover:bg-teal-600 text-white py-4 rounded-3xl text-lg font-medium shadow-lg shadow-teal-500/30 transition-all active:scale-[0.98]">
      문의하기
    </button>

    <!-- 푸터 -->
    <p class="text-center text-xs text-zinc-400 mt-12 pb-8">© 피스웍스 • Peace Works</p>
  </div>

  <!-- 문의하기 모달 -->
  <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end md:items-center justify-center z-50" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal bg-white dark:bg-zinc-900 w-full max-w-md mx-4 mb-4 md:mb-0 rounded-3xl p-8 shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h2 id="modal-title" class="text-2xl font-semibold">문의하기</h2>
        <button type="button" id="btn-close-modal" class="text-3xl text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300" aria-label="닫기">×</button>
      </div>

      <form id="inquiry-form" class="space-y-6" novalidate>
        <div>
          <label class="block text-sm font-medium mb-1.5" for="name">이름</label>
          <input type="text" id="name" name="name" required minlength="1" maxlength="50"
                 class="w-full px-5 py-3.5 bg-zinc-100 dark:bg-zinc-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500"
                 placeholder="이름을 입력하세요">
          <p id="error-name" class="hidden mt-1 text-sm text-red-500"></p>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5" for="email">이메일</label>
          <input type="email" id="email" name="email" required
                 class="w-full px-5 py-3.5 bg-zinc-100 dark:bg-zinc-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500"
                 placeholder="example@email.com">
          <p id="error-email" class="hidden mt-1 text-sm text-red-500"></p>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5" for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" required minlength="10" maxlength="1000"
                    class="w-full px-5 py-3.5 bg-zinc-100 dark:bg-zinc-800 rounded-3xl focus:outline-none focus:ring-2 focus:ring-teal-500 resize-none"
                    placeholder="문의 내용을 입력하세요 (10자 이상)"></textarea>
          <p id="error-message" class="hidden mt-1 text-sm text-red-500"></p>
        </div>

        <button type="submit" id="btn-submit"
                class="w-full bg-teal-500 hover:bg-teal-600 text-white py-4 rounded-3xl font-medium text-lg transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
          보내기
        </button>
      </form>
    </div>
  </div>

  <!-- 성공 토스트 -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-50">
    <i class="fa-solid fa-check-circle text-teal-400"></i>
    <span id="toast-text" class="font-medium">문의가 성공적으로 전송되었습니다!</span>
  </div>

  <!-- 에러 토스트 (선택) -->
  <div id="toast-error" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-50">
    <i class="fa-solid fa-exclamation-circle"></i>
    <span id="toast-error-text" class="font-medium">전송에 실패했습니다. 잠시 후 다시 시도해 주세요.</span>
  </div>

<script>
  // ---------- Tailwind 다크모드 설정 ----------
  (function initTailwind() {
    if (typeof tailwind !== 'undefined') {
      tailwind.config = { content: [], theme: { extend: {} }, darkMode: 'class' };
    }
  })();

  // ---------- 테마 토글 ----------
  var themeToggle = document.getElementById('theme-toggle');
  function setTheme(isDark) {
    if (isDark) {
      document.documentElement.classList.add('dark');
      themeToggle.innerHTML = '☀️';
      themeToggle.setAttribute('aria-label', '라이트 모드로 전환');
    } else {
      document.documentElement.classList.remove('dark');
      themeToggle.innerHTML = '🌙';
      themeToggle.setAttribute('aria-label', '다크 모드로 전환');
    }
    try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch (e) {}
  }

  themeToggle.addEventListener('click', function() {
    var isDark = !document.documentElement.classList.contains('dark');
    setTheme(isDark);
  });

  if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    setTheme(true);
  } else {
    setTheme(false);
  }

  // ---------- 모달 열기/닫기 ----------
  var modal = document.getElementById('modal');
  var btnInquiry = document.getElementById('btn-inquiry');
  var btnCloseModal = document.getElementById('btn-close-modal');

  function openModal() {
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    document.getElementById('name').focus();
  }
  function closeModal() {
    modal.classList.add('hidden');
    document.body.style.overflow = '';
  }

  btnInquiry.addEventListener('click', openModal);
  btnCloseModal.addEventListener('click', closeModal);
  modal.addEventListener('click', function(e) {
    if (e.target === modal) closeModal();
  });

  // ---------- 폼 검증 (순수 함수 형태로 검증만 수행) ----------
  function validateForm(payload) {
    var errors = {};
    var name = (payload.name || '').trim();
    var email = (payload.email || '').trim();
    var message = (payload.message || '').trim();

    if (!name || name.length < 1) errors.name = '이름을 입력해 주세요.';
    else if (name.length > 50) errors.name = '이름은 50자 이내로 입력해 주세요.';

    if (!email) errors.email = '이메일을 입력해 주세요.';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errors.email = '올바른 이메일 형식이 아닙니다.';

    if (!message || message.length < 10) errors.message = '문의 내용은 10자 이상 입력해 주세요.';
    else if (message.length > 1000) errors.message = '문의 내용은 1000자 이내로 입력해 주세요.';

    return { valid: Object.keys(errors).length === 0, errors: errors };
  }

  function showFieldErrors(errors) {
    ['name', 'email', 'message'].forEach(function(field) {
      var el = document.getElementById('error-' + field);
      var input = document.getElementById(field);
      if (!el || !input) return;
      if (errors[field]) {
        el.textContent = errors[field];
        el.classList.remove('hidden');
        input.setAttribute('aria-invalid', 'true');
      } else {
        el.classList.add('hidden');
        input.setAttribute('aria-invalid', 'false');
      }
    });
  }

  // ---------- 토스트 표시 ----------
  function showToast(text) {
    var toast = document.getElementById('toast');
    var toastText = document.getElementById('toast-text');
    if (toastText) toastText.textContent = text || '문의가 성공적으로 전송되었습니다!';
    toast.classList.remove('hidden');
    setTimeout(function() {
      toast.classList.add('opacity-0', 'transition-opacity', 'duration-500');
      setTimeout(function() {
        toast.classList.add('hidden');
        toast.classList.remove('opacity-0');
      }, 500);
    }, 3000);
  }

  function showErrorToast(text) {
    var toast = document.getElementById('toast-error');
    var toastText = document.getElementById('toast-error-text');
    if (toastText) toastText.textContent = text || '전송에 실패했습니다. 잠시 후 다시 시도해 주세요.';
    toast.classList.remove('hidden');
    setTimeout(function() {
      toast.classList.add('opacity-0', 'transition-opacity', 'duration-500');
      setTimeout(function() {
        toast.classList.add('hidden');
        toast.classList.remove('opacity-0');
      }, 500);
    }, 3000);
  }

  // ---------- 폼 제출 (실제 전송은 백엔드/Formsubmit 등으로 연동 가능) ----------
  var form = document.getElementById('inquiry-form');
  var btnSubmit = document.getElementById('btn-submit');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    var payload = {
      name: (document.getElementById('name').value || '').trim(),
      email: (document.getElementById('email').value || '').trim(),
      message: (document.getElementById('message').value || '').trim()
    };

    var result = validateForm(payload);
    if (!result.valid) {
      showFieldErrors(result.errors);
      return;
    }
    showFieldErrors({});

    // 로딩 상태
    btnSubmit.disabled = true;
    btnSubmit.textContent = '전송 중...';

    // 실제 전송 로직: Formsubmit.co, Web3Forms, Notion API 등으로 교체 가능
    setTimeout(function() {
      try {
        console.log('문의 내용:', payload);
        // 예: fetch('/api/inquiry', { method: 'POST', body: JSON.stringify(payload) })
        closeModal();
        showToast();
        form.reset();
      } catch (err) {
        showErrorToast();
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.textContent = '보내기';
      }
    }, 600);
  });
</script>
</body>
</html>
